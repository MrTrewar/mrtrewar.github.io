<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=no"
    />
    <title>Gero Wieger — Shared Board</title>
    <meta name="theme-color" content="#F5F0EB" />
    <link rel="stylesheet" href="css/landing.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Inter:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  </head>
  <body>
    <canvas id="board"></canvas>

    <header class="ui top-bar">
      <div class="brand">
        <span class="brand-title">Shared Board</span>
        <span class="brand-sub">Mal was — bleibt für alle</span>
      </div>
      <nav class="projects">
        <a href="game.html" class="nav-link">Spiel</a>
        <a href="mannheim-skater/" class="nav-link">Skater</a>
        <a href="gym-tracker/" class="nav-link">Training</a>
      </nav>
    </header>

    <div class="ui status" id="status">Verbinde…</div>

    <div class="ui color-picker" id="color-picker" hidden>
      <canvas id="wheel" class="wheel-canvas" width="180" height="180"></canvas>
      <div class="picker-row">
        <span class="picker-label">Helligkeit</span>
        <input
          type="range"
          id="lightness"
          min="15"
          max="85"
          value="50"
          class="picker-slider"
        />
      </div>
      <div class="picker-footer">
        <span class="picker-swatch" id="picker-preview"></span>
        <span class="picker-hex" id="picker-hex">#000000</span>
      </div>
    </div>

    <footer class="ui tool-bar" id="toolbar">
      <div class="tool-group colors" id="colors">
        <button
          type="button"
          class="swatch swatch-custom"
          id="custom-swatch"
          title="Eigene Farbe wählen"
          aria-label="Eigene Farbe wählen"
        ></button>
      </div>

      <div class="tool-group size-group">
        <label for="size" class="tool-label">Größe</label>
        <input type="range" id="size" min="2" max="28" value="5" />
        <span class="size-preview" id="size-preview"></span>
      </div>

      <div class="tool-group actions">
        <button
          class="tool-btn"
          id="eraser"
          title="Radiergummi (Hintergrundfarbe)"
        >
          Radierer
        </button>
        <button
          class="tool-btn"
          id="undo"
          title="Letzten eigenen Strich zurücknehmen"
        >
          Rückgängig
        </button>
        <input
          type="text"
          id="author"
          maxlength="18"
          placeholder="Dein Name (optional)"
          autocomplete="off"
        />
      </div>
    </footer>

    <script src="js/landing.js"></script>
  </body>
</html>
