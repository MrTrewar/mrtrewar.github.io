<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gero Wieger</title>
  <link rel="stylesheet" href="css/landing.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Inter:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>

  <!-- Loading -->
  <div id="loading">
    <span id="loading-text">Loading</span>
    <div id="loading-bar"><div id="loading-fill"></div></div>
  </div>

  <!-- Scroll hint -->
  <div id="scroll-hint">
    <span>Scroll</span>
    <div class="arrow"></div>
  </div>

  <!-- Scroll-driven MRT animation -->
  <section id="scroll-section">
    <div id="canvas-wrap">
      <canvas id="mrt-canvas"></canvas>
      <!-- Overlay content hovers over animation -->
      <div id="overlay-content">
        <h2 class="section-title">Projekte</h2>
        <div class="buttons">
          <a href="game.html" class="btn btn--primary">Spiel</a>
          <a href="mannheim-skater/" class="btn btn--primary">Mannheim Skater</a>
          <a href="gym-tracker/" class="btn">Training</a>
        </div>
        <footer>Gero Wieger</footer>
      </div>
    </div>
  </section>

  <script src="js/landing.js"></script>
</body>
</html>
